# ==========================================
# KubePolaris Docker Compose
# ==========================================
# 使用方法:
#   cp .env.example .env  # 复制并配置环境变量
#   docker compose up -d
#   docker compose logs -f
#   docker compose down
# ==========================================


services:
  # ==========================================
  # MySQL 数据库
  # ==========================================
  mysql:
    image: registry.cn-hangzhou.aliyuncs.com/clay-wangzhi/mysql:8.0
    container_name: kubepolaris-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: kubepolaris
      MYSQL_USER: kubepolaris
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - kubepolaris-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD && mysql -h localhost -u kubepolaris -p$$MYSQL_PASSWORD -e 'SELECT 1' kubepolaris || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 60s

  # ==========================================
  # KubePolaris 应用服务
  # ==========================================
  kubepolaris:
    build:
      context: .
      dockerfile: Dockerfile
    image: registry.cn-hangzhou.aliyuncs.com/clay-wangzhi/kubepolaris:${VERSION:-latest}
    container_name: kubepolaris
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      grafana:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SERVER_MODE: ${SERVER_MODE:-release}
      DB_DRIVER: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: kubepolaris
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_DATABASE: kubepolaris
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE_TIME: 24
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ARTHAS_ENABLED: ${ARTHAS_ENABLED:-true}
      ARTHAS_PACKAGE_SOURCE: ${ARTHAS_PACKAGE_SOURCE:-url}
      ARTHAS_PACKAGE_URL: ${ARTHAS_PACKAGE_URL:-https://arthas.aliyun.com/arthas-boot.jar}
      ARTHAS_AUTO_EXEC_LOW_RISK: ${ARTHAS_AUTO_EXEC_LOW_RISK:-true}
      ARTHAS_SESSION_TIMEOUT: ${ARTHAS_SESSION_TIMEOUT:-30}
      ARTHAS_MAX_OUTPUT_BYTES: ${ARTHAS_MAX_OUTPUT_BYTES:-1048576}
      TZ: Asia/Shanghai
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - kubepolaris_logs:/app/logs
    networks:
      - kubepolaris-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 100s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ==========================================
  # Grafana
  # ==========================================
  grafana:
    image: registry.cn-hangzhou.aliyuncs.com/clay-wangzhi/grafana:10.2.0
    container_name: kubepolaris-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SECURITY_COOKIE_SAMESITE: lax
      GF_SECURITY_COOKIE_SECURE: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_ANONYMOUS_ORG_NAME: Main Org.
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_LOG_LEVEL: info
      # 配置子路径，通过代理访问
      GF_SERVER_ROOT_URL: "/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      TZ: Asia/Shanghai
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - kubepolaris-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Grafana 初始化（自动生成 API Key）
  # ==========================================
  grafana-init:
    image: registry.cn-hangzhou.aliyuncs.com/clay-wangzhi/curl:8.16.0
    container_name: kubepolaris-grafana-init
    user: "0:0"  # 以 root 用户运行，解决权限问题
    depends_on:
      grafana:
        condition: service_healthy
    environment:
      GRAFANA_URL: http://grafana:3000
      GRAFANA_USER: admin
      GRAFANA_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - ./deploy/docker/grafana/secrets:/secrets
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "⏳ 等待 Dashboard 加载完成..."
        sleep 5

        echo "🔧 设置 KubePolaris 文件夹权限..."
        curl -s -X POST \
          -u "$${GRAFANA_USER}:$${GRAFANA_PASSWORD}" \
          -H "Content-Type: application/json" \
          -d '{"items":[{"role":"Viewer","permission":1},{"role":"Editor","permission":2}]}' \
          "$${GRAFANA_URL}/api/folders/kubepolaris-folder/permissions"
        echo " ✅ 权限设置完成"

        echo ""
        echo "🔑 创建 Service Account 和 API Token..."

        SA_EXISTS=$$(curl -s -u "$${GRAFANA_USER}:$${GRAFANA_PASSWORD}" \
          "$${GRAFANA_URL}/api/serviceaccounts/search?query=kubepolaris" | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)

        if [ -z "$$SA_EXISTS" ]; then
          echo "  📝 创建新的 Service Account..."
          SA_RESULT=$$(curl -s -X POST \
            -u "$${GRAFANA_USER}:$${GRAFANA_PASSWORD}" \
            -H "Content-Type: application/json" \
            -d '{"name":"kubepolaris","role":"Admin","isDisabled":false}' \
            "$${GRAFANA_URL}/api/serviceaccounts")
          SA_ID=$$(echo "$$SA_RESULT" | grep -o '"id":[0-9]*' | cut -d: -f2)
          echo "  ✅ Service Account 创建成功，ID: $$SA_ID"
        else
          SA_ID=$$SA_EXISTS
          echo "  ℹ️  Service Account 已存在，ID: $$SA_ID"
        fi

        curl -s -u "$${GRAFANA_USER}:$${GRAFANA_PASSWORD}" \
          "$${GRAFANA_URL}/api/serviceaccounts/$$SA_ID/tokens" | \
          grep -o '"id":[0-9]*' | cut -d: -f2 | while read TOKEN_ID; do
            curl -s -X DELETE \
              -u "$${GRAFANA_USER}:$${GRAFANA_PASSWORD}" \
              "$${GRAFANA_URL}/api/serviceaccounts/$$SA_ID/tokens/$$TOKEN_ID"
          done

        echo "  🔐 生成新的 API Token..."
        TOKEN_RESULT=$$(curl -s -X POST \
          -u "$${GRAFANA_USER}:$${GRAFANA_PASSWORD}" \
          -H "Content-Type: application/json" \
          -d '{"name":"kubepolaris-token","secondsToLive":0}' \
          "$${GRAFANA_URL}/api/serviceaccounts/$$SA_ID/tokens")

        API_KEY=$$(echo "$$TOKEN_RESULT" | grep -o '"key":"[^"]*"' | cut -d'"' -f4)

        if [ -n "$$API_KEY" ]; then
          echo "$$API_KEY" > /secrets/grafana_api_key
          echo "  ✅ API Token 已保存到 /secrets/grafana_api_key"
          echo ""
          echo "=========================================="
          echo "🎉 Grafana 初始化完成！"
          echo "=========================================="
        else
          echo "  ❌ Token 创建失败: $$TOKEN_RESULT"
          exit 1
        fi
    networks:
      - kubepolaris-network
    restart: "no"

# ==========================================
# 数据卷
# ==========================================
volumes:
  mysql_data:
    name: kubepolaris-mysql-data
  grafana_data:
    name: kubepolaris-grafana-data
  kubepolaris_logs:
    name: kubepolaris-logs

# ==========================================
# 网络
# ==========================================
networks:
  kubepolaris-network:
    name: kubepolaris-network
    driver: bridge
